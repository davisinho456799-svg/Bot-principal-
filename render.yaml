services:
  - type: web
    name: manhwa-discord-bot
    env: node
    region: oregon
    plan: free
    buildCommand: npx pnpm install && npx pnpm --filter @workspace/db run push && npx pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: EXA_API_KEY
        sync: false
